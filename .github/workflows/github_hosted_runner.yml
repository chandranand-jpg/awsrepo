name: GitHub-Hosted Runner Demo

# Trigger the workflow on push events to the main branch
on:
  push:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    # Specifies the GitHub-managed runner environment
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required to request the OIDC JWT token
      contents: read     # Required to check out repository code

    steps:
      # Step 1: Check out the repository source code onto the runner
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      
      - name: Debug OIDC Token Claims
        run: |
          # Request the OIDC ID token from GitHub's internal endpoint
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')

          # Split and base64 decode the JWT payload
          PAYLOAD=$(echo "$TOKEN" | cut -d'.' -f2)
          # Pad base64 string if necessary
          MOD=$((${#PAYLOAD} % 4))
          if [ $MOD -eq 2 ]; then PAYLOAD="${PAYLOAD}=="; elif [ $MOD -eq 3 ]; then PAYLOAD="${PAYLOAD}="; fi
          
          echo "=== DECODED OIDC JWT PAYLOAD ==="
          echo "$PAYLOAD" | base64 -d | jq .
          

      - name: Configure AWS Credentials via STS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::078716601120:role/github-actions-runner-role
          aws-region: ap-southeast-2
          # audience: sts.amazonaws.com

      - name: Verify STS Identity
        run: |
          aws sts get-caller-identity
          
      - name: Execute Deployment Commands
        run: |
          echo "Executing CI/CD commands safely using short-lived credentials..."
          # Insert AWS CLI or deployment scripts here (e.g., sam deploy, helm)


